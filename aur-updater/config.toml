# AUR auto-updater — package manifest. See README.md for the full field reference.
#
# Per package:
#   path           = package directory (submodule), relative to the repo root
#   version_script = version-detection script; prints ONLY the version (e.g.
#                    3.1.8) and exits 0; non-zero exit if the upstream is broken
#   version_regex  = regex validating the detected version (guards against a CDN
#                    returning something other than a version)
#   reset_pkgrel   = reset pkgrel=1 on a pkgver bump
#   aur_remote     = AUR SSH remote (default derived from the pkgname)
#   push_mirror    = also push to `origin` (e.g. a GitHub mirror)

[telegram]
enabled = true
# token/chat_id come from the env (TG_BOT_TOKEN / TG_CHAT_ID) via EnvironmentFile.

[packages.zcode-appimage]
path = "zcode-appimage"
version_script = "fetch-version.sh"
version_regex = '^\d+\.\d+\.\d+$'
reset_pkgrel = true
aur_remote = "ssh://aur@aur.archlinux.org/zcode-appimage.git"
push_mirror = true
